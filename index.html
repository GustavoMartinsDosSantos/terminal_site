<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Portfólio de Gustavo Martins dos Santos — Full-Stack Developer." />
    <meta name="theme-color" content="#160b13" />
    <title>Gustavo Santos — Terminal</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main class="shell" aria-label="Portfólio em formato de terminal">
      <section id="terminal" class="terminal" aria-live="polite" aria-label="Saída do terminal"></section>

      <form id="commandForm" class="command-line" autocomplete="off">
        <label class="prompt" for="commandInput">
          <span class="user">gustavo@portfolio</span><span>:</span><span id="promptPath" class="path">~</span><span>$</span>
        </label>
        <input id="commandInput" name="command" type="text" aria-label="Digite um comando" autofocus spellcheck="false" />
      </form>
    </main>

    <script src="./js/strings.js?v=7"></script>
    <script src="./js/navigation.js?v=7"></script>
    <script src="./js/utils.js?v=7"></script>
    <script src="./js/commands.js?v=7"></script>
    <script src="./js/functions.js?v=7"></script>
  </body>
</html>
